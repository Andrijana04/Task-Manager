apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: taskmanager
type: Opaque
# Values are base64 encoded:
# echo -n "admin" | base64        => YWRtaW4=
# echo -n "secret123" | base64    => c2VjcmV0MTIz
# echo -n "taskmanager" | base64  => dGFza21hbmFnZXI=
data:
  mongo-root-username: YWRtaW4=
  mongo-root-password: c2VjcmV0MTIz
  mongo-database: dGFza21hbmFnZXI=
